<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>站点废弃通知 - 中国驻外大使馆信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 完全仿照原网站美术风格的红框紧急公告 */
        .emergency-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .emergency-board {
            background: #ffe9e9;
            border-left: 6px solid #e74c3c;
            border-radius: 16px;
            padding: 2rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            font-size: 1rem;
            color: #a1220a;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s;
        }

        .emergency-board strong {
            color: #c0392b;
            font-weight: 700;
        }

        .emergency-board a {
            color: #2c6e9e;
            background: rgba(255,255,255,0.7);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .emergency-board a:hover {
            background: white;
            text-decoration: underline;
        }

        /* 保留原网站的装饰性细节 */
        .emergency-board::before {
            content: "⚠️";
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
        }

        /* 可选：保留极简的页脚风格（原网站有footer） */
        .silent-footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            font-size: 0.7rem;
            color: #b0bec5;
            border-top: 1px solid #e0e7ef;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 680px) {
            body {
                padding: 16px;
            }
            .emergency-board {
                padding: 1.5rem;
                font-size: 0.9rem;
            }
            .emergency-board::before {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="emergency-container">
    <!-- 红框公告 —— 完全复刻原网站的“emergency-board”美术风格，仅保留核心废弃信息 -->
    <div class="emergency-board">
        <strong>⚠️ 本站由于管理员密码的严重泄露风险而被废弃。</strong><br><br>
        请前往新版站点：<a href="https://lkjy-coding.github.io/ChineseEmbassyV5.html" target="_blank" rel="noopener noreferrer">https://lkjy-coding.github.io/ChineseEmbassyV5.html</a>
    </div>

    <!-- 轻量页脚，沿袭原网站的极简风格，与红框分离，不干扰主信息 -->
    <div class="silent-footer">
        原领事信息站已停止维护 · 请关注新版站点
    </div>
</div>

<script>
    // （可选）极简控制台提示，不干扰用户；无须任何交互逻辑，完全符合“废弃站”语义
    (function() {
        console.warn(
            "⚠️ 本网站（中国驻外大使馆信息旧版）因管理员密码泄露风险已正式废弃。\n" +
            "请访问新版站点：https://lkjy-coding.github.io/ChineseEmbassyV5.html"
        );
    })();
</script>
</body>
</html>
