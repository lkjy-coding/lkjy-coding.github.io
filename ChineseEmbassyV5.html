<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>站点维护中 · 中国领事服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            color: #1e2a3a;
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
        }

        /* 核心黄框卡片 */
        .notice-card {
            background: #fff8e7;
            border-left: 8px solid #f5a623;
            border-radius: 28px;
            padding: 2rem 2rem 2rem 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        /* 大标题区域 */
        .title-block {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #b45f06, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .main-title span {
            font-size: 2.2rem;
        }

        /* 小文字说明区 */
        .message-detail {
            color: #5a3e1b;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
            border-left: 3px solid #f5a62380;
            padding-left: 1rem;
        }

        .message-detail p {
            margin-bottom: 0.5rem;
        }

        .small-text {
            font-size: 0.9rem;
            color: #7d5d2e;
        }

        /* 官方链接区块 — 温和蓝灰搭配，延续参考样式风格 */
        .official-links {
            background: #eef2fa;
            border-radius: 20px;
            padding: 1rem 1.2rem;
            margin-top: 1.8rem;
            border: 1px solid #dce5ef;
        }

        .official-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #1e5a7a;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .links-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }

        .links-group a {
            color: #2c6e9e;
            text-decoration: none;
            background: rgba(44, 110, 158, 0.08);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .links-group a:hover {
            background: rgba(44, 110, 158, 0.2);
            text-decoration: underline;
        }

        .emergency-hotline {
            background: #fef1e0;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            margin-top: 1.2rem;
            display: inline-block;
            width: auto;
            font-size: 0.9rem;
            font-weight: 600;
            color: #b45309;
            border: 1px solid #ffe0b5;
        }

        .hotline-number {
            font-family: monospace;
            background: #fff3e6;
            padding: 0.2rem 0.7rem;
            border-radius: 36px;
            margin: 0 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #8a9bb0;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
        }

        /* 小点缀动画 */
        @keyframes gentlePulse {
            0% { opacity: 0.7; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.02);}
        }

        .notice-card {
            animation: gentlePulse 0.4s ease-out;
        }

        @media (max-width: 560px) {
            body {
                padding: 16px;
            }
            .notice-card {
                padding: 1.5rem;
            }
            .main-title {
                font-size: 1.8rem;
            }
            .main-title span {
                font-size: 1.8rem;
            }
            .message-detail {
                font-size: 0.9rem;
            }
            .links-group a {
                padding: 4px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 唯一核心黄框：完全符合“只有一个黄框，上面写（第一行大标题，剩下小文字）” -->
    <div class="notice-card">
        <div class="title-block">
            <div class="main-title">
                <span>⚠️</span> 功能开发中
            </div>
        </div>
        <div class="message-detail">
            <p>本站正在开发新功能，请稍等再访问。</p>
            <p>这不会耽误太久。</p>
            <p class="small-text">更多信息可关注下方官方渠道，紧急帮助请拨打领事保护热线。</p>
        </div>

        <!-- 官方信息板块 (延续参考风格：保持蓝框样式，但整体仍在黄框内部，满足布局完整性) -->
        <div class="official-links">
            <div class="official-header">
                <span>🏛️</span> 官方权威信息源 · 领事服务
            </div>
            <div class="links-group">
                <a href="https://cs.mfa.gov.cn/" target="_blank" rel="noopener noreferrer">📘 中国领事服务网</a>
                <a href="https://www.fmprc.gov.cn/" target="_blank" rel="noopener noreferrer">🌐 中国外交部官网</a>
                <a href="https://cs.mfa.gov.cn/gyls/lsgz/lsyj/jszwqw/" target="_blank" rel="noopener noreferrer">⚠️ 安全提醒专栏</a>
                <a href="https://cs.mfa.gov.cn/zggmzhw/lsbh/" target="_blank" rel="noopener noreferrer">🛡️ 领事保护专栏</a>
            </div>
            <div class="emergency-hotline">
                📞 外交部全球领事保护与服务应急热线：
                <strong class="hotline-number">0086-10-12308</strong>
                <span style="margin:0 4px">/</span>
                <strong class="hotline-number">0086-10-65612308</strong>
            </div>
            <div style="font-size: 0.7rem; color: #6a7c8f; margin-top: 12px;">
                如遇紧急情况，请第一时间联系当地警方及中国使领馆寻求帮助。
            </div>
        </div>
    </div>

    <footer>
        中国领事服务网 · 权威领事信息平台<br>
        本页面为临时维护公告，正式服务恢复后我们将第一时间开放。
    </footer>
</div>
</body>
</html>
